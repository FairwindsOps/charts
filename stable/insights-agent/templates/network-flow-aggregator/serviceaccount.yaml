{{- if (index .Values "network-observability" "enabled") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "insights-agent.fullname" . }}-network-flow-aggregator
  namespace: {{ .Release.Namespace }}
  labels:
    app: insights-agent
    component: network-flow-aggregator
  {{- with (index .Values "network-observability" "aggregator" "serviceAccount" "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
