image:
  # -- Docker image tag, defaults to the Chart appVersion
  tag:

# -- Installation code provided by Fairwinds.
installationCode:

# -- Name of secret containing INSTALLATION_CODE
installationCodeSecret:

# -- Deployments additional labels
deployments:
  additionalLabels:
  additionalPodLabels:

polaris:
  # -- Configuration for Polaris
  config:

dashboardImage:
  # -- Docker image repository for the front end
  repository: us-docker.pkg.dev/fairwinds-ops/insights/insights-dashboard
  # -- Overrides tag for the dashboard, defaults to image.tag
  tag:
apiImage:
  # -- Docker image repository for the API server
  repository: us-docker.pkg.dev/fairwinds-ops/insights/insights-api
  # -- Overrides tag for the API server, defaults to image.tag
  tag:
migrationImage:
  # -- Docker image repository for the database migration job
  repository: us-docker.pkg.dev/fairwinds-ops/insights/insights-db-migration
  # -- Overrides tag for the migration image, defaults to image.tag
  tag:
cronjobImage:
  # -- Docker image repository for maintenance CronJobs.
  repository: us-docker.pkg.dev/fairwinds-ops/insights/insights-cronjob
  # -- Overrides tag for the cronjob image, defaults to image.tag
  tag:
openApiImage:
  # -- Docker image repository for the Open API server
  repository: swaggerapi/swagger-ui
  # -- Overrides tag for the Open API server, defaults to image.tag
  tag: v5.32.4  # NOTE: if you're changing this, be sure to look at templates/openapi-nginx-conf.yaml

options:
  # -- Which version of the Insights Agent is supported by this version of Fairwinds Insights
  agentChartTargetVersion: 5.3.0
  # -- Do not change, this is the hostname that Fairwinds Insights will reach out to for license verification.
  insightsSAASHost: "https://insights.fairwinds.com"
  # -- Allow cookies to work over HTTP instead of requiring HTTPS. This generally should not be changed.
  allowHTTPCookies: false
  # -- Configuration file to use for the front-end. This generally should not be changed.
  dashboardConfig: config.self.js
  # -- An email address for the first admin user. This account will get created automatically but without a known password. You must initiate a password reset in order to login to this account.
  adminEmail:
  # -- The name of your organization. This will pre-populate Insights with an organization.
  organizationName:
  # -- Autogenerate keys for session tracking. For testing/demo purposes only
  autogenerateKeys: false
  # -- Run the job to migrate health scores to a new format
  migrateHealthScore: false
  # -- Name of the secret where session keys and other secrets are stored
  secretName: fwinsights-secrets

  # This adds an empty low-priority pod, so we don't have
  # to wait for cluster-autoscaler with each deployment
  overprovisioning:
    enabled: false
    # requests should always match limits here, so we don't separate them
    cpu: 1000m
    memory: 1Gi
  # -- Whether to require SSO for the admin API
  ssoRequiredForAdminAPI: false

cronjobOptions:
  # -- Default security context for cronjobs
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    privileged: false
    runAsNonRoot: true
    runAsUser: 10324
    capabilities:
      drop:
        - ALL
  # -- Default resources for cronjobs
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 250m
      memory: 512Mi
  # -- Default additional env vars for all cronjobs (overridden per cronjob by cronjobs.<name>.additionalEnvVars)
  additionalEnvVars:
    - name: POSTGRES_MAX_IDLE_CONNS
      value: "1"
    - name: POSTGRES_MAX_OPEN_CONNS
      value: "1"

cronjobs:
  # -- Options for the action-items filters refresher job.
  action-item-filters-refresh:
    command: action_items_filters_refresher
    schedule: "0/15 * * * *"

  # -- Options for the action item stats job
  action-items-statistics:
    command: action_items_statistics
    schedule: "15 * * * *"

  # -- Options for the benchmark job
  benchmark:
    command: benchmark
    schedule: ""

  # -- Options for the update tickets job.
  update-tickets:
    command: update_tickets
    includeGitHubSecret: true
    schedule: "0 * * * *"
    resources:
      limits:
        cpu: 500m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 2Gi

  # -- Options for the cloud costs update job
  costs-update:
    command: cloud_costs_update
    includeGitHubSecret: true
    schedule: "15 */3 * * *"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 500m
        memory: 2Gi

  # -- Options for the database cleanup job.
  database-cleanup:
    command: database_cleanup
    schedule: "0 0 * * *"

  # -- Options for the email digest job.
  email:
    command: email_digest
    schedule: ""

  # -- Options for the resources recommendations job
  resources-recommendations:
    command: resources_recommendations
    schedule: "0 2 * * *"
    resources:
      requests:
        cpu: 1
        memory: 3Gi
      limits:
        cpu: 1
        memory: 3Gi

  # -- Options for the SAML sync job
  saml:
    command: refresh_saml_metadata
    schedule: "0 * * * *"

  # -- Options for the slack channels job.
  slack-channels:
    command: slack_channels_local_refresher
    schedule: "0/15 * * * *"

  # -- Options for the trial-end job.
  trial-end:
    command: trial_end_downgrade
    schedule: ""

  # -- Options for the move-health-scores-to-ts job.
  move-health-scores-to-ts:
    command: move_resource_health_scores_to_ts
    schedule: "*/30 * * * *"

  # -- Options for the image-vulns-refresh job.
  image-vulns-refresh:
    command: image_vulnerabilities_refresher
    schedule: "*/30 * * * *"

  # -- Options for the image-vulnerabilities-on-demand-refresher
  img-vulns-on-demand-refresh:
    command: image_vulnerabilities_on_demand_refresher
    schedule: "*/2 * * * *"

  # -- Options for the sync-action-items-iac-files cronjob.
  sync-action-items-iac-files:
    command: sync_action_items_iac_files
    schedule: "0 * * * *"

  # -- Options for the app_groups_cves_statistics cronjob.
  app-groups-cves-statistics:
    command: app_groups_cves_statistics
    schedule: "0 9,21 * * *"

  # -- Options for the cve_reports_email_sender cronjob.
  cve-reports-email-sender:
    command: cve_reports_email_sender
    schedule: "0 5 1 * *"

  # -- Options for the refresh_jira_webhooks cronjob
  refresh-jira-webhooks:
    command: refresh_jira_webhooks
    schedule: "0 0 1,15 * *"

  # -- Options for the utmstack_integration cronjob
  utmstack-integration:
    command: utmstack_integration
    schedule: "*/5 * * * *"

selfHostedSecret:

# -- Additional Environment Variables to set on the Fairwinds Insights pods.
additionalEnvironmentVariables: {}

rbac:
  serviceAccount:
    # -- Annotations to add to the service account
    annotations: {}

dashboard:
  pdb:
    # -- Create a pod disruption budget for the front end pods.
    enabled: false
    # -- How many replicas should always exist for the front end pods.
    minReplicas: 1
  hpa:
    # -- Create a horizontal pod autoscaler for the front end pods.
    enabled: false
    # -- Minimum number of replicas for the front end pods.
    min: 2
    # -- Maximum number of replicas for the front end pods.
    max: 4
    # -- Scaling metrics
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 75
  # -- Resources for the front end pods.
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 256Mi
  # -- Node Selector for the front end pods.
  nodeSelector: {}
  # -- Tolerations for the front end pods.
  tolerations: []
  # topologySpreadConstraints -- Default TopologySpreadConstraints for the front end pods.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: dashboard
          app.kubernetes.io/name: fairwinds-insights
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: dashboard
          app.kubernetes.io/name: fairwinds-insights
  securityContext:
    # -- The user ID to run the Dashboard under. comes from https://github.com/nginxinc/docker-nginx-unprivileged/blob/main/stable/alpine/Dockerfile
    runAsUser: 101

api:
  # -- Port for the API server to listen on.
  port: 8080
  pdb:
    # -- Create a pod disruption budget for the API server.
    enabled: false
    # -- How many replicas should always exist for the API server.
    minReplicas: 1
  hpa:
    # -- Create a horizontal pod autoscaler for the API server.
    enabled: false
    # -- Minimum number of replicas for the API server.
    min: 2
    # -- Maximum number of replicas for the API server.
    max: 4
    # -- Scaling metrics
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 75
  # -- Resources for the API server.
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 256Mi
  # -- Node Selector for the API server.
  nodeSelector: {}
  # -- Tolerations for the API server.
  tolerations: []
  # topologySpreadConstraints -- Default TopologySpreadConstraints for the API server.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api
          app.kubernetes.io/name: fairwinds-insights
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api
          app.kubernetes.io/name: fairwinds-insights
  securityContext:
    # -- The user ID to run the API server under.
    runAsUser: 10324
  ingress:
    # -- Enable the Open API ingress
    enabled: true
  service:
    # -- Service type for Open API server
    type:
  additionalEnvVars:
    - name: POSTGRES_MAX_IDLE_CONNS
      value: "5"
    - name: POSTGRES_MAX_OPEN_CONNS
      value: "15"

openApi:
  # -- Port for the Open API server to listen on.
  port: 8080
  pdb:
    # -- Create a pod disruption budget for the Open API server.
    enabled: false
    # -- How many replicas should always exist for the Open API server.
    minReplicas: 1
  hpa:
    # -- Create a horizontal pod autoscaler for the Open API server.
    enabled: false
    # -- Minimum number of replicas for the Open API server.
    min: 2
    # -- Maximum number of replicas for the Open API server.
    max: 3
    # -- Scaling metrics
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 75
  # -- Resources for the Open API server.
  resources:
    limits:
      cpu: 256m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 100Mi
  # -- Node Selector for the Open API server.
  nodeSelector: {}
  # -- Tolerations for the Open API server.
  tolerations: []
  # topologySpreadConstraints -- Default TopologySpreadConstraints for the Open API Server.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: open-api
          app.kubernetes.io/name: fairwinds-insights
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: open-api
          app.kubernetes.io/name: fairwinds-insights
  ingress:
    # -- Enable the Open API ingress
    enabled: true
  service:
    # -- Service type for Open API server
    type:

# -- [Fairwinds Insights MCP server](https://quay.io/repository/fairwinds/insights-mcp-server) — Model Context Protocol bridge to the Insights API. **Disabled by default.**Transport `MCP_SERVER_TYPE` must be `sse` or `streamable` in-cluster (`stdio` is for local clients). Env vars and behavior follow the upstream server; the image defaults include `FAIRWINDS_API_BASE_URL` (override with `mcp.fairwindsApiBaseUrl` or rely on `options.host` / `ingress.hostedZones`). When `ingress.enabled` is true, `/mcp` is routed on the main Ingress to the MCP service.
mcp:
  # -- Deploy the Insights MCP server workload
  enabled: false
  image:
    # -- Container image repository
    repository: quay.io/fairwinds/insights-mcp-server
    # -- Image tag (`latest` matches the published default; pin a digest or version for production)
    tag: latest
    # -- Image pull policy
    pullPolicy: Always
  # -- Pod replica count (ignored at runtime when `hpa.enabled` is true)
  replicas: 1
  # -- `MCP_SERVER_TYPE`: `stdio` (local), `sse`, or `streamable` — use `sse` or `streamable` in Kubernetes
  serverType: streamable
  # -- `MCP_SERVER_PORT` / container listen port
  port: 8080
  # -- `FAIRWINDS_API_BASE_URL` — Insights API base URL for the MCP server. If empty, uses `options.host`, else the first `ingress.hostedZones` with `https://`, else the SaaS default.
  fairwindsApiBaseUrl: ""
  # -- Extra environment variables for the MCP container (appended after built-in env)
  additionalEnvVars: []
  # -- Optional `envFrom` (ConfigMaps / Secrets) for bulk env injection
  envFrom: []
  # -- Container resources
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Container security context (`mcp` image runs as UID 1001)
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    privileged: false
    runAsNonRoot: true
    runAsUser: 1001
    capabilities:
      drop:
        - ALL
  # -- Pod-level security context
  podSecurityContext:
    fsGroup: 1001
  # -- Liveness probe (TCP avoids hanging on SSE paths)
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  # -- Readiness probe
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  # -- Optional startup probe (e.g. set `tcpSocket.port: http` and `failureThreshold` for slow starts)
  # startupProbe: {}
  # -- Mount extra volumes (e.g. custom CA)
  extraVolumeMounts: []
  extraVolumes: []
  # -- Optional init containers
  initContainers: []
  pdb:
    # -- PodDisruptionBudget for the MCP Deployment
    enabled: false
    # -- Minimum available pods (map to PDB `minAvailable`)
    minReplicas: 1
  hpa:
    # -- HorizontalPodAutoscaler for the MCP Deployment
    enabled: false
    min: 1
    max: 3
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80
  service:
    # -- Service type (`ClusterIP`, `NodePort`, or `LoadBalancer`)
    type:
    # -- Service port exposed to clients (targets the container `http` port)
    port:
    # -- Service annotations (e.g. cloud LB internal annotations)
    annotations: {}
    # -- `nodePort` when `type` is `NodePort`
    nodePort:
  ingress:
    # -- Enable the MCP ingress
    enabled: false
  # -- Node selector for MCP pods
  nodeSelector: {}
  # -- Tolerations for MCP pods
  tolerations: []
  # -- Affinity for MCP pods
  affinity: {}
  # topologySpreadConstraints -- Spread MCP pods across zones/nodes
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: mcp
          app.kubernetes.io/name: fairwinds-insights
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: mcp
          app.kubernetes.io/name: fairwinds-insights
  # -- Pod annotations
  podAnnotations: {}
  # -- Extra labels on the pod template
  podLabels: {}
  # -- Annotations on the Deployment
  deploymentAnnotations: {}
  # -- Priority class name
  priorityClassName: ""
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # -- Disable service account token mount if the workload does not need the Kubernetes API
  automountServiceAccountToken: false

dbMigration:
  # -- Override the Helm hook for the database migration job.
  overrideHook: ""
  # -- Max seconds to wait for PostgreSQL and Timescale to be ready before migration runs before failing. 0 = no timeout.
  waitTimeout: 600
  # -- Resources for the database migration job.
  resources:
    limits:
      cpu: 1
      memory: 1024Mi
    requests:
      cpu: 80m
      memory: 128Mi
  securityContext:
    # -- The user ID to run the database migration job under.
    runAsUser: 10324

oneTimeMigration:
  # -- Resources for the one time migration job.
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  securityContext:
    # -- The user ID to run the migration job under.
    runAsUser: 10324
  # -- Additional environment variables for the one time migration job.
  additionalEnv:
    - name: POSTGRES_MAX_IDLE_CONNS
      value: "1"
    - name: POSTGRES_MAX_OPEN_CONNS
      value: "1"

service:
  # -- Port to be used for the API and Dashboard services.
  port: 80
  # -- Service type for the API and Dashboard services
  type: NodePort
  # -- Annotations for the services
  annotations:

# -- Prefix to use on hostname. Generally not needed.
sanitizedBranch:

# -- Maximum length for hostname prefix.
sanitizedPrefixMaxLength: 12

ingress:
  # -- Enable Ingress
  enabled: false
  # -- Ingress class name (e.g. nginx, traefik). When set, adds spec.ingressClassName to all Ingress resources.
  className: ""
  # -- Enable TLS
  tls: true
  # -- Hostnames to use for Ingress
  hostedZones: []
  # -- Annotations to add to the API and Dashboard ingresses.
  annotations: {}
  # -- Certain ingress controllers do pattern matches, others use prefixes. If `/*` doesn't work for your ingress, try setting this to false.
  starPaths: true
  # -- Create different Ingress objects for the API and dashboard - this allows them to have different annotations
  separate: false
  # -- Adds additional path ie. Redirect path for ALB
  extraPaths: {}

postgresql:
  # -- Set to `true` to run migrations after the install, upgrade
  postMigrate: false
  image:
    registry: quay.io
    repository: fairwinds/postgres-partman
    tag: "17.0"
  # -- Use the ephemeral postgresql cluster by default
  ephemeral: true
  # -- Install CloudNativePG operator
  operator:
    install: true
    # -- CloudNativePG operator version to install
    version: "1.28.1"
    # -- Fallback CloudNativePG operator version when version is "latest" but resolution from GitHub fails
    defaultVersion: "1.28.1"
    # -- CloudNativePG operator configuration
    webhook:
      mutating:
        create: true
      validating:
        create: true
    crds:
      create: true
    # -- Per-cluster timeout for `kubectl wait --for=condition=Ready` on each CNPG Cluster in the pre-install hook (PostgreSQL and Timescale when ephemeral). Keeps the hook from finishing before both databases accept connections.
    clusterReadyTimeoutSeconds: 600
  # -- SSL mode for connecting to the database
  sslMode: require
  # -- TLS mode for connecting to the database
  tls:
    enabled: true
    certificatesSecret: fwinsights-postgresql-ca
    certFilename: tls.crt
    certKeyFilename: tls.key
  # -- Host for postgresql (CloudNativePG cluster name)
  postgresqlHost: insights-postgres-rw
  port: 5432
  # -- Storage configuration for the PostgreSQL cluster
  storage:
    size: 10Gi
    storageClass: standard
  # -- Resource configuration for the PostgreSQL cluster
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 75m
      memory: 256Mi
  # -- Authentication configuration
  auth:
    username: postgres
    database: fairwinds_insights
    existingSecret: fwinsights-postgresql
    existingSuperUserSecret: fwinsights-postgresql-superuser
    secretKeys:
      adminPasswordKey: postgresql-password
    # -- ExternalSecret configuration for PostgreSQL credentials.
    # NOTE: the application does NOT use this Secret yet — it still reads from `auth.existingSecret`.
    # This lets you verify the ExternalSecret syncs correctly before cutting over.
    # To cut over: set `auth.existingSecret` to the externalSecret `name` and remove the old manually-managed Secret.
    externalSecret:
      # -- When true (and `postgresql.ephemeral` is false), provisions an ExternalSecret and a corresponding Secret.
      create: false
      # -- Name of the ExternalSecret resource and the Secret it generates.
      name: fwinsights-postgresql-external
      # -- SecretStore reference
      secretStoreRef:
        name: fairwinds-vault-backend
        kind: ClusterSecretStore
      # -- Extra annotations on the ExternalSecret resource (e.g. argocd.argoproj.io/sync-wave)
      annotations: {}
      # -- ExternalSecret spec.data entries (each must have `secretKey` and `remoteRef` with `key` + `property`)
      data: []
      # Example:
      # - secretKey: postgresql-password
      #   remoteRef:
      #     key: your/vault/path
      #     property: password
      # - secretKey: readonly-password
      #   remoteRef:
      #     key: your/vault/path
      #     property: readonly_password
  # -- PostgreSQL configuration parameters
  parameters:
    max_connections: "100"
    shared_buffers: "256MB"
    effective_cache_size: "1GB"
    maintenance_work_mem: "64MB"
    checkpoint_completion_target: "0.9"
    wal_buffers: "16MB"
    default_statistics_target: "100"
    random_page_cost: "1.1"
    effective_io_concurrency: "200"
    work_mem: "4MB"
    min_wal_size: "1GB"
    max_wal_size: "4GB"
    max_worker_processes: "8"
    max_parallel_workers_per_gather: "2"
    max_parallel_workers: "8"
    max_parallel_maintenance_workers: "2"
    password_encryption: "scram-sha-256"
  # -- Optional read replica configuration. Set cronjob `options.useReadReplica` to `true` to enable it
  readReplica:
    username:
    database:
    host:
    port:
    sslMode:
encryption:
  aes:
    cypherKey:

timescale:
  # -- Provision TimescaleDB with CloudNativePG in-cluster (same pattern as `postgresql.ephemeral`). Breaking change: the legacy timescaledb-single subchart is no longer part of this chart.
  ephemeral: true
  # -- SSL mode for connecting to the database
  sslMode: require
  # -- Host for Timescale (CloudNativePG read-write service)
  postgresqlHost: insights-timescale-rw
  # -- Username to connect to Timescale with
  postgresqlUsername: postgres
  # -- Name of the Postgres database
  postgresqlDatabase: postgres
  # -- App user password for ephemeral CNPG (random if unset)
  password: ""
  # -- Superuser password for ephemeral CNPG (random if unset)
  superuserpassword: ""
  image:
    # -- Optional registry prefix; leave empty for Docker Hub short form `timescale/timescaledb-ha:tag`
    registry: ""
    repository: timescale/timescaledb-ha
    tag: pg17.9-ts2.25.1-all
  # -- PostgreSQL major version for ClusterImageCatalog + imageCatalogRef (must match the image)
  imageCatalog:
    major: 17
  # -- Container UID/GID for Timescale HA image (CNPG; often 1000 for timescaledb-ha)
  postgresUID: 1000
  postgresGID: 1000
  # -- Libraries loaded at server start; required before bootstrap postInitSQL can run `CREATE EXTENSION timescaledb` (see CloudNativePG Timescale examples).
  sharedPreloadLibraries:
    - timescaledb
  # -- PostgreSQL parameters for the Timescale CNPG cluster (`shared_preload_libraries` is set via sharedPreloadLibraries above)
  parameters:
    max_connections: "100"
  storage:
    size: 10Gi
    storageClass: standard
  auth:
    existingSecret: fwinsights-timescale
    existingSuperUserSecret: fwinsights-timescale-superuser
    secretKeys:
      adminPasswordKey: postgresql-password
  secrets:
    certificateSecretName: fwinsights-timescale-ca
    credentialsSecretName: fwinsights-timescale
  service:
    primary:
      port: 5432
  loadBalancer:
    enabled: false
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

email:
  # -- How to send emails, valid values include memory, ses, and smtp
  strategy: memory
  # -- Email address that emails will come from
  sender:
  # -- Email address to send notifications of new user signups.
  recipient:
  # -- Host for SMTP strategy
  smtpHost:
  # -- Username for SMTP strategy
  smtpUsername:
  # -- Port for SMTP strategy
  smtpPort:
  # -- Region for SES strategy, AWS_ACCESS_KEY_ID, and AWS_SECRET_ACCESS_KEY will need to be provided in the fwinsights-secrets secret.
  awsRegion:

reportStorage:
  # -- How to store report files: `rustfs` (in-cluster RustFS or external S3-compatible API via `s3Endpoint`; chart sets `REPORT_STORAGE_S3_*` and `REPORT_STORAGE_STRATEGY=rustfs` per Insights `pkg/files/s3.go`), `s3` (AWS S3 via default SDK credentials when no in-cluster RustFS / no custom endpoint), or `local`
  strategy: rustfs
  # -- Bucket name for rustfs, s3, or local
  bucket: reports
  # -- Region for REPORT_STORAGE_REGION (AWS SDK / S3-compatible clients)
  region: us-east-1
  # -- Full URL for S3-compatible API when strategy is `rustfs` and RustFS runs outside the cluster (required when `rustfs.install` is false)
  s3Endpoint:
  # -- Secret with `accessKeyId` and `secretAccessKey` when strategy is `rustfs` and `rustfs.install` is false (external S3-compatible storage)
  s3CredentialsSecret:
  # -- Directory to store files in for local.
  fixturesDir:

# RustFS subchart (https://charts.rustfs.com/) — default in-cluster object storage for self-hosted installs. Keys merge into the upstream chart (`helm show values rustfs/rustfs`); `createBucketJob` is used only by this chart’s create-bucket Job.
# Upstream defaults assume distributed mode (4 replicas) and enable Ingress; the overrides below keep a single-node, in-cluster endpoint.
rustfs:
  # -- Install RustFS in-cluster for report storage. Prefer `helm install|upgrade --wait --wait-for-jobs` so the bucket Job completes before Helm exits.
  install: true
  nameOverride: fw-rustfs
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  ingress:
    enabled: false
  affinity:
    podAntiAffinity:
      enabled: false
  service:
    endpoint:
      port: 9000
  storageclass:
    name: ""
    dataStorageSize: 50Gi
    logStorageSize: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
  createBucketJob:
    enabled: true
    repository: amazon/aws-cli
    tag: "2.34.31"

migrateHealthScoreJob:
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 80m
      memory: 128Mi

cronjobExecutor:
  image:
    repository: alpine/kubectl
    tag: "1.35.4"
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 1m
      memory: 3Mi

reportjob:
  enabled: true
  pdb:
    enabled: true
    minReplicas: 1
  hpa:
    enabled: true
    min: 2
    max: 6
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 75
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 80m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  # topologySpreadConstraints -- Default TopologySpreadConstraints for the reportJob Deployment.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: reportjob
          app.kubernetes.io/name: fairwinds-insights
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: reportjob
          app.kubernetes.io/name: fairwinds-insights
  terminationGracePeriodSeconds: 600
  # When true, sets ENABLE_APP_GROUP_HEALTH_FOR_REPORT_WORKFLOW on report_job so it enqueues the app-group health Temporal workflow after legacy cluster TS scores (requires general_worker).
  appGroupHealthForReportWorkflowEnabled: false
  additionalEnvVars: []

# -- Deploy the outbox worker
outboxWorker:
  # -- Enable the outbox-worker Deployment
  enabled: true
  # -- Number of replicas
  replicas: 1
  image:
    # -- Overrides `apiImage.repository` when set (non-empty)
    repository: ""
    # -- Overrides the API image tag when set (non-empty); otherwise uses `fairwinds-insights.apiImageTag`
    tag: ""
  # -- Container image pull policy
  imagePullPolicy: Always
  # -- Container entrypoint command (Insights API worker), e.g. same style as `report_job`
  command:
    - outbox_worker
  # -- Optional args for the container
  args: []
  # -- When true, `env` uses the PostgreSQL read replica settings where applicable
  useReadReplica: false
  # -- Resource requests and limits for the outbox worker container
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Container security context for the outbox worker
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    privileged: false
    runAsNonRoot: true
    runAsUser: 10324
    capabilities:
      drop:
        - ALL
  # -- Extra environment variables for the outbox worker container
  additionalEnvVars: []
  # -- nodeSelector for the outbox worker pod
  nodeSelector: {}
  # -- Tolerations for the outbox worker pod
  tolerations: []
  # -- Topology spread constraints for the outbox worker pod
  topologySpreadConstraints: []
  # -- Optional pod affinity (set to a mapping to enable)
  affinity: null
  # -- Extra volumes for the pod (e.g. emptyDir). No GitHub secret volume is added by default.
  volumes: []
  # -- Volume mounts matching `outboxWorker.volumes`
  volumeMounts: []
  # -- Optional init containers
  initContainers: []
  # -- Pod termination grace period (seconds)
  terminationGracePeriodSeconds: 600
  # -- Optional priority class name for the pod
  priorityClassName: ""
  # -- Extra annotations on the Deployment (merged with Polaris annotations)
  annotations: {}
  # -- Extra annotations on the pod template
  podAnnotations: {}

# -- Default options for temporal deployments
temporalDeploymentDefaults:
  useReadReplica: false
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    privileged: false
    runAsNonRoot: true
    runAsUser: 10324
    capabilities:
      drop:
        - ALL
  hpa:
    enabled: true
    min: 2
    max: 4
    metrics: []
  pdb:
    enabled: false
    minAvailable: 1
  rbac:
    enabled: false
    serviceAccount:
      # -- Annotations to add to the service account
      annotations: {}
  tolerations: []
  topologySpreadConstraints: []
  args: []
  additionalEnv: []
  volumeMounts:
    - name: secrets
      mountPath: /var/run/secrets/github
  volumes:
    - name: secrets
      secret:
        secretName: github-secrets
        optional: true

# -- Temporal worker deployments
temporalDeployments:
  delete-org-cluster-worker:
    enabled: true
    command: "delete_organization_and_cluster_worker"
    hpa:
      min: 1
      max: 1
      metrics: []
    pdb:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 1024Mi
    tolerations: []
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: delete-org-cluster-worker
            app.kubernetes.io/name: fairwinds-insights
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: delete-org-cluster-worker
            app.kubernetes.io/name: fairwinds-insights
    args: []
    additionalEnv:
      - name: POSTGRES_MAX_IDLE_CONNS
        value: "2"
      - name: POSTGRES_MAX_OPEN_CONNS
        value: "2"
  general-worker:
    enabled: true
    command: "general_worker"
    hpa:
      min: 2
      max: 2
      metrics: []
    pdb:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 1024Mi
    tolerations: []
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: general-worker
            app.kubernetes.io/name: fairwinds-insights
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: general-worker
            app.kubernetes.io/name: fairwinds-insights
    args: []
    additionalEnv:
      - name: POSTGRES_MAX_IDLE_CONNS
        value: "3"
      - name: POSTGRES_MAX_OPEN_CONNS
        value: "6"
  github-worker:
    enabled: true
    command: "github_worker"
    hpa:
      min: 2
      max: 2
      metrics: []
    pdb:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 512Mi
    tolerations: []
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: github-worker
            app.kubernetes.io/name: fairwinds-insights
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: github-worker
            app.kubernetes.io/name: fairwinds-insights
    args: []
    additionalEnv:
      - name: POSTGRES_MAX_IDLE_CONNS
        value: "2"
      - name: POSTGRES_MAX_OPEN_CONNS
        value: "2"
      - name: INSIGHTS_CI_IMAGE_VERSION
        value: "6.2"
    rbac:
      enabled: true
      rules:
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["get", "create", "delete"]
        - apiGroups: [""]
          resources: ["pods/log"]
          verbs: ["get"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["list", "get"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["list", "get"]
        - apiGroups: [""]
          resources: ["secrets", "configmaps"]
          verbs: ["create", "delete"]
  report-job-worker:
    enabled: true
    command: "report_job_worker"
    hpa:
      min: 2
      max: 6
      metrics: []
    pdb:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 1024Mi
    tolerations: []
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: report-job-worker
            app.kubernetes.io/name: fairwinds-insights
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: report-job-worker
            app.kubernetes.io/name: fairwinds-insights
    args: []
    additionalEnv:
      - name: POSTGRES_MAX_IDLE_CONNS
        value: "3"
      - name: POSTGRES_MAX_OPEN_CONNS
        value: "6"
      - name: ENABLE_APP_GROUP_HEALTH_FOR_REPORT_WORKFLOW
        value: "false"
  # Example: Add more temporal workers like this:
  # report-processor-worker:
  #   enabled: false
  #   command: "report_processor_worker"
  #   resources:
  #     limits:
  #       cpu: 1000m
  #       memory: 2048Mi
  #     requests:
  #       cpu: 200m
  #       memory: 512Mi

# -- Temporal workflow schedules (created via CLI on install/upgrade). Empty by default.
# Each schedule is created or updated idempotently. Input will be passed to the workflow as a JSON object.
# Example:
# temporalSchedulers:
#   - name: my-report-schedule
#     workflowType: MyReportWorkflow
#     taskQueue: my-task-queue
#     cron: "0 * 1 * *"
#     overlapPolicy: Skip
#     input:
#       RecipientEmails:
#         - user1@example.com
#         - user2@example.com
temporalSchedulers: []

# -- Job that creates/updates Temporal schedules from temporalSchedulers
temporalSchedulersJob:
  image:
    repository: temporalio/admin-tools
    tag: "1.30.4.1"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  apiKey:
    existingSecret: ""
    existingSecretKey: api-key
  tls:
    enabled: false
    existingSecret: temporal-frontend-client-certs
    caFilename: ca.crt
    certFilename: tls.crt
    keyFilename: tls.key
    # -- Disable host verification if using internal cluster connections where cert CN/SAN doesn't match service DNS
    disableHostVerification: false
    serverName: ""

temporal:
  # fairwinds-insights specific values - this will be inject as an env vars into fairwinds insights deployments
  hostPort: "insights-temporal-frontend:7233"
  namespace: "fwinsights"
  # custom values from temporal chart (v1.x: no bundled DB subcharts; persistence uses raw server config under datastores)
  enabled: true
  fullnameOverride: insights-temporal
  schema:
    # Set to true to use Helm hooks for schema creation. In certain environments, enabling Helm hooks can cause database creation to fail and block installation.
    useHelmHooks: false
    securityContext:
      fsGroup: 1000
      runAsUser: 1000
  # Temporal server 1.30+ images — disable legacy shims (https://github.com/temporalio/helm-charts/blob/main/UPGRADING.md)
  shims:
    dockerize: false
    elasticsearchTool: false
  server:
    replicaCount: 1
    config:
      namespaces:
        create: true
        namespace:
          - name: fwinsights
            retention: 3d
      persistence:
        defaultStore: default
        visibilityStore: visibility
        # Must match the value from the initial Temporal deployment (default in pre-1.0 chart was 512).
        numHistoryShards: 512
        datastores:
          default:
            sql:
              # Databases are expected to exist; schema job still runs when manageSchema is true.
              createDatabase: true
              manageSchema: true
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal
              connectAddr: "insights-postgres-rw:5432"
              connectProtocol: tcp
              user: postgres
              existingSecret: fwinsights-postgresql
              # for a production deployment use this instead of `password` and provision the secret beforehand e.g. with a sealed secret
              secretKey: password
              maxConns: 5
              maxIdleConns: 3
              maxConnLifetime: "1h"
              tls:
                enabled: true
                enableHostVerification: false
                # cert/key stored in secret-with-certs (server + admintools volume mounts below).
                certFile: /etc/temporal/tls/tls.crt
                keyFile: /etc/temporal/tls/tls.key
          visibility:
            sql:
              createDatabase: true
              manageSchema: true
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal_visibility
              connectAddr: "insights-postgres-rw:5432"
              connectProtocol: tcp
              user: postgres
              existingSecret: fwinsights-postgresql
              secretKey: password
              maxConns: 5
              maxIdleConns: 3
              maxConnLifetime: "1h"
              tls:
                enabled: true
                enableHostVerification: false
                certFile: /etc/temporal/tls/tls.crt
                keyFile: /etc/temporal/tls/tls.key

    additionalVolumes:
      - name: secret-with-certs
        secret:
          secretName: fwinsights-postgresql-ca
          defaultMode: 0600

    additionalVolumeMounts:
      - name: secret-with-certs
        mountPath: "/etc/temporal/tls"
        readOnly: true

  # Schema / create-database init jobs use admintools.* mounts (not server.*).
  admintools:
    additionalVolumes:
      - name: secret-with-certs
        secret:
          secretName: fwinsights-postgresql-ca
          defaultMode: 0600
    additionalVolumeMounts:
      - name: secret-with-certs
        mountPath: "/etc/temporal/tls"
        readOnly: true
