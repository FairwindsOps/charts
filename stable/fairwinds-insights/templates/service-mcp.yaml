{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fairwinds-insights.fullname" . }}-mcp
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ default .Values.service.type .Values.mcp.service.type }}
  ports:
    - port: {{ default .Values.service.port .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.mcp.service.type "NodePort") .Values.mcp.service.nodePort }}
      nodePort: {{ .Values.mcp.service.nodePort }}
      {{- end }}
  selector:
    {{- include "fairwinds-insights.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
{{- end }}
