{{- if and .Values.insightsMCP.enabled .Values.insightsMCP.ingress.enabled }}
{{- $fullName := include "fairwinds-insights.fullname" . -}}
{{- $hosts := .Values.insightsMCP.ingress.hosts | default list -}}
{{- if eq (len $hosts) 0 -}}
{{- if eq (len .Values.ingress.hostedZones) 0 -}}
{{- fail "insightsMCP.ingress.enabled requires either insightsMCP.ingress.hosts or ingress.hostedZones to be non-empty" -}}
{{- end -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-insights-mcp
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
    app.kubernetes.io/component: insights-mcp
  annotations:
    {{- with .Values.insightsMCP.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
{{- end }}
{{- if .Values.insightsMCP.ingress.tls }}
  tls:
    - secretName: {{ .Values.insightsMCP.ingress.tlsSecretName | default (printf "%s-cert" $fullName) }}
      hosts:
        {{- if gt (len $hosts) 0 }}
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        {{- range .Values.ingress.hostedZones }}
        - {{ include "fairwinds-insights.sanitizedPrefix" $ }}{{ . }}
        {{- end }}
        {{- end }}
{{- end }}
  rules:
    {{- if gt (len $hosts) 0 }}
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          {{- range $.Values.insightsMCP.ingress.paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}-insights-mcp
                port:
                  name: http
          {{- end }}
    {{- end }}
    {{- else }}
    {{- range .Values.ingress.hostedZones }}
    - host: {{ include "fairwinds-insights.sanitizedPrefix" $ }}{{ . }}
      http:
        paths:
          {{- range $.Values.insightsMCP.ingress.paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}-insights-mcp
                port:
                  name: http
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
