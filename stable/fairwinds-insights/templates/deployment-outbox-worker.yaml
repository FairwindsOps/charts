{{- if .Values.outboxWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fairwinds-insights.fullname" . }}-outbox-worker
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
    app.kubernetes.io/component: outbox-worker
    {{- if .Values.deployments.additionalLabels }}
    {{ toYaml .Values.deployments.additionalLabels | nindent 4 }}
    {{- end }}
  annotations:
    polaris.fairwinds.com/livenessProbeMissing-exempt: "true"
    polaris.fairwinds.com/readinessProbeMissing-exempt: "true"
    {{- with .Values.outboxWorker.annotations }}
    {{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.outboxWorker.replicas }}
  selector:
    matchLabels:
      {{- include "fairwinds-insights.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: outbox-worker
  template:
    metadata:
      labels:
        {{- include "fairwinds-insights.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: outbox-worker
        {{- if .Values.deployments.additionalPodLabels }}
        {{ toYaml .Values.deployments.additionalPodLabels | nindent 8 }}
        {{- end }}
      {{- with .Values.outboxWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      serviceAccountName: {{ include "fairwinds-insights.fullname" . }}-insights
      terminationGracePeriodSeconds: {{ .Values.outboxWorker.terminationGracePeriodSeconds }}
      {{- with .Values.outboxWorker.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.outboxWorker.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fairwinds-insights
          image: "{{ .Values.outboxWorker.image.repository | default .Values.apiImage.repository }}:{{ .Values.outboxWorker.image.tag | default (include "fairwinds-insights.apiImageTag" .) }}"
          imagePullPolicy: {{ .Values.outboxWorker.imagePullPolicy }}
          command:
            {{- toYaml .Values.outboxWorker.command | nindent 12 }}
          {{- with .Values.outboxWorker.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "env" (dict "useReadReplica" .Values.outboxWorker.useReadReplica "root" .) | indent 10 }}
          {{- with .Values.outboxWorker.additionalEnvVars }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
          resources:
            {{- toYaml .Values.outboxWorker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.outboxWorker.securityContext | nindent 12 }}
          {{- with .Values.outboxWorker.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.outboxWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.outboxWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.outboxWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.outboxWorker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.outboxWorker.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
