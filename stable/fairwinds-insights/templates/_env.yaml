{{ define "env" }}
{{- $useReadReplica := .useReadReplica }}
{{- $ := .root }}
# Required values
envFrom:
- secretRef:
    name: {{ $.Values.options.secretName }}
env:
- name: FAIRWINDS_HOST
  {{- if $.Values.options.host }}
  value: {{ $.Values.options.host }}
  {{- else if gt (len $.Values.ingress.hostedZones) 0 }}
  value: {{ "https://" }}{{ include "fairwinds-insights.sanitizedPrefix" $ }}{{ index $.Values.ingress.hostedZones 0 }}
  {{- end }}
{{- if $.Values.options.allowHTTPCookies }}
- name: ALLOW_HTTP_COOKIES
  value: "true"
{{- end }}
{{- with $.Values.additionalEnvironmentVariables }}
{{- range $k, $v := . }}
- name: {{ $k }}
  value: {{ $v | quote }}
{{- end }}
{{- end }}
{{- with $.Values.selfHostedSecret }}
- name: FAIRWINDS_CERTIFICATE_LOCATION
  value: /var/run/secrets/self-hosted/current.pem
- name: SELF_HOSTED_PUBLIC_KEY
  valueFrom:
    secretKeyRef:
      name: {{ . }}
      key: pubkey
{{- end }}
{{- with $.Values.installationCode }}
- name: INSTALLATION_CODE
  value: {{ . | quote }}
{{- end }}
{{- with $.Values.installationCodeSecret }}
- name: INSTALLATION_CODE
  valueFrom:
    secretKeyRef:
      name: {{ . | quote }}
      key: INSTALLATION_CODE
{{- end }}
- name: CACHE_BUST_TOKEN
  value: {{ randAlphaNum 10 }}
- name: FAIRWINDS_AGENT_CHART_TARGET_VERSION
  value: {{ $.Values.options.agentChartTargetVersion }}
# General Server
{{- with $.Values.options.authRateLimit }}
- name: AUTH_RATE_LIMIT
  value: {{ . | quote }}
{{- end }}
# Database
{{- if and ($useReadReplica) ($.Values.postgresql.readReplica) }}
- name: POSTGRES_DB
  value: {{ $.Values.postgresql.readReplica.database }}
- name: POSTGRES_USER
  value: {{ $.Values.postgresql.readReplica.username }}
- name: POSTGRES_PORT
  value: {{ $.Values.postgresql.readReplica.port | quote }}
- name: POSTGRES_SSL_MODE
  value: {{ $.Values.postgresql.readReplica.sslMode | default "require" }}
- name: POSTGRES_HOST
  value: {{ $.Values.postgresql.readReplica.host }}
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.postgresql.auth.existingSecret }}
      key: readreplica-password
{{- else }}
- name: POSTGRES_DB
  value: {{ $.Values.postgresql.auth.database }}
- name: POSTGRES_USER
  value: {{ $.Values.postgresql.auth.username }}
- name: POSTGRES_PORT
  value: {{ $.Values.postgresql.port | quote }}
- name: POSTGRES_SSL_MODE
  value: {{ $.Values.postgresql.sslMode | default "require" }}
- name: POSTGRES_HOST
  value: {{ $.Values.postgresql.postgresqlHost | default (printf "%s-%s" $.Release.Name "postgresql") }}
{{- if $.Values.postgresql.ephemeral }}
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.postgresql.auth.existingSecret }}
      key: password
{{- else if $.Values.postgresql.readOnly }}
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.postgresql.auth.existingSecret }}
      key: readonly-password
{{- else }}
- name: POSTGRES_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.postgresql.auth.existingSecret }}
      key: postgresql-password
{{- end }}
{{- end }}
# Timescale Database
- name: TIMESCALE_DB
  value: {{ $.Values.timescale.postgresqlDatabase }}
- name: TIMESCALE_USER
  value: {{ $.Values.timescale.postgresqlUsername }}
- name: TIMESCALE_PORT
  value: {{ $.Values.timescale.service.primary.port | quote }}
- name: TIMESCALE_SSL_MODE
  value: {{ $.Values.timescale.sslMode | default "require" }}
- name: TIMESCALE_HOST
  value: {{ $.Values.timescale.postgresqlHost | default (printf "%s-%s" $.Release.Name "timescale") }}
{{- if $.Values.timescale.ephemeral }}
- name: TIMESCALE_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.timescale.secrets.credentialsSecretName }}
      key: PATRONI_SUPERUSER_PASSWORD
{{- else }}
- name: TIMESCALE_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ $.Values.postgresql.auth.existingSecret }}
      key: timescale-password
{{- end }}
{{- with $.Values.options.insightsSAASHost }}
- name: INSIGHTS_SAAS_HOST
  value: {{ . | quote }}
{{- end }}
{{- if $.Values.options.addFixtures }}
- name: ADD_FIXTURES
  value: "true"
{{- end }}
{{- if $.Values.reportStorage.skipFileFixtures }}
- name: SKIP_FILE_FIXTURES 
  value: "true"
{{- end }}

# Report Storage
{{- /* In-cluster RustFS with legacy defaults (strategy still "minio"): use S3-compat env and effective strategy rustfs so the app reads REPORT_STORAGE_S3_* */}}
{{- $reportStorageS3Compat := or (eq $.Values.reportStorage.strategy "rustfs") (and (eq $.Values.reportStorage.strategy "s3") (or $.Values.rustfs.install $.Values.reportStorage.s3Endpoint)) (and $.Values.rustfs.install (eq $.Values.reportStorage.strategy "minio")) }}
- name: REPORT_STORAGE_STRATEGY
  value: {{ ternary "rustfs" $.Values.reportStorage.strategy (and $.Values.rustfs.install (eq $.Values.reportStorage.strategy "minio")) | quote }}
{{ if and (eq $.Values.reportStorage.strategy "minio") (not $.Values.rustfs.install) -}}
{{ if $.Values.reportStorage.minioHost -}}
- name: MINIO_HOST
  value: {{ $.Values.reportStorage.minioHost }}
{{ else }}
- name: MINIO_HOST
  value: {{ printf "%s-%s" $.Release.Name "fw-minio:9000" }}
{{ end -}}
- name: MINIO_ACCESS_KEY_ID
  valueFrom:
    secretKeyRef:
      name: {{ printf "%s-%s" $.Release.Name $.Values.minio.nameOverride }}
      key: rootUser                
- name: MINIO_SECRET_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: {{ printf "%s-%s" $.Release.Name $.Values.minio.nameOverride }}
      key: rootPassword
{{ else if $reportStorageS3Compat -}}
{{- if $.Values.reportStorage.s3Endpoint }}
- name: REPORT_STORAGE_S3_ENDPOINT
  value: {{ $.Values.reportStorage.s3Endpoint | quote }}
{{- else if $.Values.rustfs.install }}
- name: REPORT_STORAGE_S3_ENDPOINT
  value: {{ printf "http://%s:%v" (include "fairwinds-insights.rustfsServiceName" $) (include "fairwinds-insights.rustfsEndpointPort" $) | quote }}
{{- else }}
{{- fail "reportStorage.s3Endpoint is required for S3-compatible storage when rustfs.install is false (strategies rustfs or s3)" }}
{{- end }}
- name: REPORT_STORAGE_S3_ACCESS_KEY_ID
  valueFrom:
    secretKeyRef:
      name: {{ if $.Values.rustfs.install }}{{ include "fairwinds-insights.rustfsCredentialsSecretName" $ }}{{ else }}{{ required "reportStorage.s3CredentialsSecret is required for external S3-compatible storage when rustfs.install is false" $.Values.reportStorage.s3CredentialsSecret }}{{ end }}
      key: {{ if $.Values.rustfs.install }}RUSTFS_ACCESS_KEY{{ else }}accessKeyId{{ end }}
- name: REPORT_STORAGE_S3_SECRET_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: {{ if $.Values.rustfs.install }}{{ include "fairwinds-insights.rustfsCredentialsSecretName" $ }}{{ else }}{{ required "reportStorage.s3CredentialsSecret is required for external S3-compatible storage when rustfs.install is false" $.Values.reportStorage.s3CredentialsSecret }}{{ end }}
      key: {{ if $.Values.rustfs.install }}RUSTFS_SECRET_KEY{{ else }}secretAccessKey{{ end }}
{{- if $.Values.reportStorage.s3MinIOCompat }}
- name: REPORT_STORAGE_S3_MINIO_COMPAT
  value: "true"
{{- end }}
{{ else if eq $.Values.reportStorage.strategy "local" -}}
- name: REPORT_STORAGE_DIR
  value: {{ $.Values.reportStorage.fixturesDir | default "/db-migrations/fixtures/files" }}
{{ end -}}
- name: REPORT_STORAGE_REGION
  value: {{ $.Values.reportStorage.region }}
- name: REPORT_STORAGE_BUCKET
  value: {{ $.Values.reportStorage.bucket | quote }}

# Email
- name: EMAIL_STRATEGY
  value: {{ $.Values.email.strategy }}
- name: EMAIL_SENDER
  value: {{ $.Values.email.sender }}
- name: EMAIL_RECIPIENT
  value: {{ $.Values.email.recipient }}
{{- if $.Values.options.ssoRequiredForAdminAPI }}
- name: SSO_REQUIRED_FOR_ADMIN_API
  value: {{ $.Values.options.ssoRequiredForAdminAPI | quote }}
{{- end }}
{{ if eq $.Values.email.strategy "smtp" -}}
- name: SMTP_HOST
  value: {{ $.Values.email.smtpHost }}
- name: SMTP_USERNAME
  value: {{ $.Values.email.smtpUsername }}
- name: SMTP_PORT
  value: {{ $.Values.email.smtpPort | quote }}
{{ else if eq $.Values.email.strategy "ses" -}}
- name: SES_AWS_REGION
  value: {{ $.Values.email.awsRegion }}
{{ end -}}

# Third-party integrations
{{ with $.Values.options.githubAppID -}}
- name: GITHUB_APP_ID
  value: {{ . | quote }}
{{ end -}}
{{ with $.Values.options.githubAppName -}}
- name: GITHUB_APP_NAME
  value: {{ . | quote }}
{{ end -}}

- name: K8S_NAMESPACE
  value: {{ $.Release.Namespace }}

# tag used for the fixer container 
- name: CRON_JOB_IMAGE_REPOSITORY
  value: {{ $.Values.cronjobImage.repository | quote }}
- name: CRON_JOB_IMAGE_TAG
  value: {{ include "fairwinds-insights.cronjobImageTag" $ | quote }}

# temporal specific
- name: TEMPORAL_HOST_PORT
  value: {{ $.Values.temporal.hostPort | quote }}
- name: TEMPORAL_NAMESPACE
  value: {{ $.Values.temporal.namespace | quote }}

{{ end }}
