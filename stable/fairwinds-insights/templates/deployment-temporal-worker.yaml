{{ range $name, $options := .Values.temporalDeployments }}
{{ if $options.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fairwinds-insights.fullname" $ }}-{{ $name }}
  labels:
    {{- include "fairwinds-insights.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
    {{- if $.Values.deployments.additionalLabels }}
    {{ toYaml $.Values.deployments.additionalLabels | nindent 4 }}
    {{- end }}
    {{- if $options.additionalLabels }}
    {{ toYaml $options.additionalLabels | nindent 4 }}
    {{- end }}
  annotations:
    polaris.fairwinds.com/livenessProbeMissing-exempt: "true"
    polaris.fairwinds.com/readinessProbeMissing-exempt: "true"
    {{- with (default $.Values.temporalDeploymentDefaults.annotations $options.annotations) }}
    {{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not (eq (include "fairwinds-insights.temporalKedaEnabled" (dict "options" $options "root" $) | trim) "true") }}
  replicas: {{ $options.replicas | default $.Values.temporalDeploymentDefaults.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fairwinds-insights.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "fairwinds-insights.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        {{- if $.Values.deployments.additionalPodLabels }}
        {{ toYaml $.Values.deployments.additionalPodLabels | nindent 8 }}
        {{- end }}
        {{- if $options.additionalPodLabels }}
        {{ toYaml $options.additionalPodLabels | nindent 8 }}
        {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.podAnnotations $options.podAnnotations) }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $.Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      {{- if (and $options.rbac $options.rbac.enabled) | default $.Values.temporalDeploymentDefaults.rbac.enabled }}
      serviceAccountName: {{ include "fairwinds-insights.fullname" $ }}-{{ $name }}
      {{- else }}
      serviceAccountName: {{ include "fairwinds-insights.fullname" $ }}-insights
      {{- end }}
      terminationGracePeriodSeconds: {{ $options.terminationGracePeriodSeconds | default $.Values.temporalDeploymentDefaults.terminationGracePeriodSeconds }}
      {{- with ($options.priorityClassName | default $.Values.temporalDeploymentDefaults.priorityClassName) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.initContainers $options.initContainers) }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fairwinds-insights
          {{- $image := default dict $options.image }}
          {{- $defaultImage := $.Values.temporalDeploymentDefaults.image }}
          image: "{{ $image.repository | default $defaultImage.repository | default $.Values.apiImage.repository }}:{{ $image.tag | default $defaultImage.tag | default (include "fairwinds-insights.apiImageTag" $) }}"
          imagePullPolicy: {{ $options.imagePullPolicy | default $.Values.temporalDeploymentDefaults.imagePullPolicy }}
          command: ["{{ $options.command }}"]
          {{- with $options.args }}
          args:
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- include "env" (dict "useReadReplica" ($options.useReadReplica | default $.Values.temporalDeploymentDefaults.useReadReplica) "root" $) | indent 10 }}
          {{- with $options.additionalEnv }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          resources:
            {{- toYaml (default $.Values.temporalDeploymentDefaults.resources $options.resources) | nindent 12 }}
          securityContext:
            {{- toYaml (default $.Values.temporalDeploymentDefaults.securityContext $options.securityContext) | nindent 12 }}
          {{- $volumeMounts := default $.Values.temporalDeploymentDefaults.volumeMounts $options.volumeMounts }}
          {{- if or $volumeMounts $.Values.selfHostedSecret }}
          volumeMounts:
            {{- with $volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if $.Values.selfHostedSecret }}
            - name: self-hosted-secret
              mountPath: /var/run/secrets/self-hosted
            {{- end }}
          {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.nodeSelector $options.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.affinity $options.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.tolerations $options.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $.Values.temporalDeploymentDefaults.topologySpreadConstraints $options.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $volumes := default $.Values.temporalDeploymentDefaults.volumes $options.volumes }}
      {{- if or $volumes $.Values.selfHostedSecret }}
      volumes:
        {{- with $volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $.Values.selfHostedSecret }}
        - name: self-hosted-secret
          secret:
            secretName: {{ $.Values.selfHostedSecret }}
        {{- end }}
      {{- end }}
---
{{ end }}
{{ end }}
