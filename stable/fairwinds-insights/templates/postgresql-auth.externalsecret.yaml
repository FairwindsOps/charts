{{- if and (not .Values.postgresql.ephemeral) .Values.postgresql.auth.externalSecret.enabled }}
{{- $externalSecret := .Values.postgresql.auth.externalSecret }}
{{- if not $externalSecret.data }}
{{- fail "postgresql.auth.externalSecret.enabled is true but postgresql.auth.externalSecret.data is empty; set data to a list of ExternalSecret spec.data entries (secretKey + remoteRef)." }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.auth.existingSecret }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: fairwinds-vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.postgresql.auth.existingSecret }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- toYaml $externalSecret.data | nindent 4 }}
{{- end }}
