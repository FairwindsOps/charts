{{- if and (not .Values.postgresql.ephemeral) .Values.postgresql.auth.externalSecret.enabled }}
{{- $externalSecret := .Values.postgresql.auth.externalSecret }}
{{- if not $externalSecret.data }}
{{- fail "postgresql.auth.externalSecret.enabled is true but postgresql.auth.externalSecret.data is empty; provide at least one entry with secretKey and remoteRef (key + property)." }}
{{- end }}
{{- range $i, $entry := $externalSecret.data }}
{{- if not $entry.secretKey }}
{{- fail (printf "postgresql.auth.externalSecret.data[%d] is missing required field 'secretKey'" $i) }}
{{- end }}
{{- if not $entry.remoteRef }}
{{- fail (printf "postgresql.auth.externalSecret.data[%d] is missing required field 'remoteRef'" $i) }}
{{- end }}
{{- if not $entry.remoteRef.key }}
{{- fail (printf "postgresql.auth.externalSecret.data[%d].remoteRef is missing required field 'key'" $i) }}
{{- end }}
{{- if not $entry.remoteRef.property }}
{{- fail (printf "postgresql.auth.externalSecret.data[%d].remoteRef is missing required field 'property'" $i) }}
{{- end }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.auth.existingSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  {{- with $externalSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $externalSecret.secretStoreRef.name }}
    kind: {{ $externalSecret.secretStoreRef.kind }}
  target:
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- toYaml $externalSecret.data | nindent 4 }}
{{- end }}
