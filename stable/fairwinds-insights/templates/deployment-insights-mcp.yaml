{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fairwinds-insights.fullname" . }}-mcp
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
    {{- if .Values.deployments.additionalLabels }}
    {{- toYaml .Values.deployments.additionalLabels | nindent 4 }}
    {{- end }}
  {{- with .Values.mcp.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.mcp.replicas }}
  revisionHistoryLimit: {{ .Values.mcp.revisionHistoryLimit }}
  {{- with .Values.mcp.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fairwinds-insights.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "fairwinds-insights.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
        {{- if .Values.deployments.additionalPodLabels }}
        {{- toYaml .Values.deployments.additionalPodLabels | nindent 8 }}
        {{- end }}
        {{- with .Values.mcp.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mcp.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      serviceAccountName: {{ include "fairwinds-insights.fullname" . }}-insights
      automountServiceAccountToken: {{ .Values.mcp.automountServiceAccountToken }}
      {{- with .Values.mcp.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.mcp.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.mcp.initContainers }}
      initContainers:
        {{- toYaml .Values.mcp.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          {{- with .Values.mcp.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: MCP_SERVER_TYPE
              value: {{ .Values.mcp.serverType | quote }}
            - name: MCP_SERVER_PORT
              value: {{ .Values.mcp.port | quote }}
            - name: FAIRWINDS_API_BASE_URL
              value: {{ include "fairwinds-insights.mcp.fairwindsApiBaseUrl" . | quote }}
            {{- with .Values.mcp.additionalEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.mcp.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mcp.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.mcp.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.mcp.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.mcp.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
