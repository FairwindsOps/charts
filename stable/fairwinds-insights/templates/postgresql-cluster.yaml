{{- $cnpgOperatorJob := and .Values.postgresql.operator.install (or .Values.postgresql.ephemeral .Values.timescale.ephemeral) }}
{{- if $cnpgOperatorJob }}
---
# Minimal RBAC for PostgreSQL / Timescale cluster creation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pg-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pg-creator
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["clusters", "clusterimagecatalogs"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
- apiGroups: [""]
  resources: ["serviceaccounts", "services", "configmaps", "secrets", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pg-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-pg-creator
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pg-creator
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-postgresql-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "meta.helm.sh/release-name": {{ .Release.Name | quote }}
    "meta.helm.sh/release-namespace": {{ .Release.Namespace | quote }}
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-pg-creator
      restartPolicy: Never
      containers:
      - name: create-cluster
        image: "alpine/kubectl:1.35.3"
        command: ["sh"]
        args:
          - -c
          - |+
            set -e
            echo "=== Creating CloudNativePG cluster(s) (operator install mode) ==="
            echo "Namespace: {{ .Release.Namespace }}"
            echo "Release: {{ .Release.Name }}"

            OPERATOR_NAMESPACE="{{ .Values.postgresql.operator.namespace }}"
            if [ -z "$OPERATOR_NAMESPACE" ]; then
              OPERATOR_NAMESPACE="cnpg-system"
            fi
            echo "Operator namespace: $OPERATOR_NAMESPACE"

            EXISTING_OPERATOR=$(kubectl get deployment -l app.kubernetes.io/name=cloudnative-pg --all-namespaces --no-headers -o custom-columns=NAMESPACE:.metadata.namespace 2>/dev/null | head -1 || echo "")

            if [ -n "$EXISTING_OPERATOR" ]; then
              echo "Using existing CloudNativePG operator in namespace: $EXISTING_OPERATOR"
              OPERATOR_NAMESPACE="$EXISTING_OPERATOR"
            else
              echo "Installing CloudNativePG operator in namespace: $OPERATOR_NAMESPACE"

                if ! kubectl get namespace "$OPERATOR_NAMESPACE" 2>/dev/null; then
                  kubectl create namespace "$OPERATOR_NAMESPACE"
                fi

                OPERATOR_VERSION="{{ .Values.postgresql.operator.version }}"
                DEFAULT_CNPG_VERSION="{{ .Values.postgresql.operator.defaultVersion | default "1.28.1" }}"
                if [ "$OPERATOR_VERSION" = "latest" ]; then
                  echo "Resolving latest CloudNativePG operator version..."
                  CNPG_VERSION=""
                  if command -v wget >/dev/null 2>&1; then
                    CNPG_VERSION=$(wget -qO- https://api.github.com/repos/cloudnative-pg/cloudnative-pg/releases/latest 2>/dev/null | grep '"tag_name"' | head -1 | sed -E 's/.*"v([^"]+)".*/\1/' || true)
                  fi
                  if [ -z "$CNPG_VERSION" ] && command -v curl >/dev/null 2>&1; then
                    CNPG_VERSION=$(curl -sSL https://api.github.com/repos/cloudnative-pg/cloudnative-pg/releases/latest 2>/dev/null | grep '"tag_name"' | head -1 | sed -E 's/.*"v([^"]+)".*/\1/' || true)
                  fi
                  if [ -z "$CNPG_VERSION" ]; then
                    echo "Could not resolve latest from GitHub API, using default: $DEFAULT_CNPG_VERSION"
                    CNPG_VERSION="$DEFAULT_CNPG_VERSION"
                  else
                    echo "Using CloudNativePG operator version: $CNPG_VERSION"
                  fi
                else
                  CNPG_VERSION="$OPERATOR_VERSION"
                fi
                CNPG_BRANCH="${CNPG_VERSION%.*}"
                MANIFEST_URL="https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-${CNPG_BRANCH}/releases/cnpg-${CNPG_VERSION}.yaml"

                echo "Installing CloudNativePG operator using standard YAML manifest..."
                kubectl apply --server-side -f "$MANIFEST_URL" || true

                echo "Verifying CloudNativePG operator installation..."
                kubectl get deploy -n cnpg-system cnpg-controller-manager

                sleep 10

              for i in {1..5}; do
                if kubectl get deployment -n cnpg-system cnpg-controller-manager >/dev/null 2>&1; then
                  echo "CloudNativePG operator installed successfully!"
                  OPERATOR_NAMESPACE="cnpg-system"
                  break
                else
                  sleep 5
                fi
              done

              if ! kubectl get deployment -n cnpg-system cnpg-controller-manager >/dev/null 2>&1; then
                echo "ERROR: Failed to install CloudNativePG operator"
                exit 1
              fi
            fi

            echo "Waiting for webhook server deployment to be ready..."
            kubectl wait --for=condition=available --timeout=300s deployment/cnpg-controller-manager -n $OPERATOR_NAMESPACE

            {{- if .Values.postgresql.ephemeral }}
            echo "Checking PostgreSQL cluster insights-postgres..."
            if kubectl get cluster insights-postgres -n {{ .Release.Namespace }} >/dev/null 2>&1; then
              echo "PostgreSQL cluster 'insights-postgres' already exists, skipping create"
            else
              echo "Creating PostgreSQL cluster..."
              cat <<EOF | kubectl apply -f -
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: insights-postgres
              namespace: {{ .Release.Namespace }}
              labels:
                {{- include "fairwinds-insights.labels" . | nindent 16 }}
            spec:
              instances: 1
              enableSuperuserAccess: true
              imageName: {{ .Values.postgresql.image.registry }}/{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
              postgresql:
                parameters:
{{- toYaml .Values.postgresql.parameters | nindent 18 }}
              bootstrap:
                initdb:
                  database: {{ .Values.postgresql.auth.database }}
                  owner: {{ .Values.postgresql.auth.username }}
                  secret:
                    name: {{ .Values.postgresql.auth.existingSecret }}
              superuserSecret:
                name: {{ .Values.postgresql.auth.existingSuperUserSecret }}
              storage:
                size: {{ .Values.postgresql.storage.size }}
                {{- if .Values.postgresql.storage.storageClass }}
                storageClass: {{ .Values.postgresql.storage.storageClass }}
                {{- end }}
              resources:
{{- toYaml .Values.postgresql.resources | nindent 16 }}
            EOF
            fi
            {{- end }}

            {{- if .Values.timescale.ephemeral }}
            echo "Applying ClusterImageCatalog for TimescaleDB..."
            cat <<EOF | kubectl apply -f -
            apiVersion: postgresql.cnpg.io/v1
            kind: ClusterImageCatalog
            metadata:
              name: {{ include "fairwinds-insights.timescaleClusterImageCatalog" . }}
              labels:
                {{- include "fairwinds-insights.labels" . | nindent 16 }}
            spec:
              images:
                - major: {{ .Values.timescale.imageCatalog.major }}
                  image: {{ include "fairwinds-insights.timescaleImage" . }}
            EOF
            echo "Checking Timescale cluster insights-timescale..."
            if kubectl get cluster insights-timescale -n {{ .Release.Namespace }} >/dev/null 2>&1; then
              echo "Timescale cluster 'insights-timescale' already exists, skipping create"
            else
              echo "Creating Timescale cluster..."
              cat <<EOF | kubectl apply -f -
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: insights-timescale
              namespace: {{ .Release.Namespace }}
              labels:
                {{- include "fairwinds-insights.labels" . | nindent 16 }}
            spec:
              instances: 1
              enableSuperuserAccess: true
              postgresUID: {{ .Values.timescale.postgresUID }}
              postgresGID: {{ .Values.timescale.postgresGID }}
              imageCatalogRef:
                apiGroup: postgresql.cnpg.io
                kind: ClusterImageCatalog
                name: {{ include "fairwinds-insights.timescaleClusterImageCatalog" . }}
                major: {{ .Values.timescale.imageCatalog.major }}
              postgresql:
{{- if .Values.timescale.sharedPreloadLibraries }}
                shared_preload_libraries:
{{- range .Values.timescale.sharedPreloadLibraries }}
                  - {{ . }}
{{- end }}
{{- end }}
                parameters:
{{- toYaml .Values.timescale.parameters | nindent 18 }}
              bootstrap:
                initdb:
                  database: {{ .Values.timescale.postgresqlDatabase }}
                  owner: {{ .Values.timescale.postgresqlUsername }}
                  secret:
                    name: {{ .Values.timescale.auth.existingSecret }}
                  postInitSQL:
                    - CREATE EXTENSION IF NOT EXISTS timescaledb;
              superuserSecret:
                name: {{ .Values.timescale.auth.existingSuperUserSecret }}
              storage:
                size: {{ .Values.timescale.storage.size }}
                {{- if .Values.timescale.storage.storageClass }}
                storageClass: {{ .Values.timescale.storage.storageClass }}
                {{- end }}
              resources:
{{- toYaml .Values.timescale.resources | nindent 16 }}
            EOF
            fi
            {{- end }}

            READY_TIMEOUT="{{ .Values.postgresql.operator.clusterReadyTimeoutSeconds | default 600 }}s"
            NS="{{ .Release.Namespace }}"
            describe_on_fail() {
              echo "--- kubectl describe cluster/$1 (last status) ---"
              kubectl describe cluster "$1" -n "$NS" 2>/dev/null | tail -40 || true
            }
            {{- if and .Values.postgresql.ephemeral .Values.timescale.ephemeral }}
            echo "Waiting for insights-postgres and insights-timescale to be Ready in parallel (each timeout=$READY_TIMEOUT)..."
            kubectl wait cluster insights-postgres -n "$NS" --for=condition=Ready --timeout="$READY_TIMEOUT" &
            _wait_pg=$!
            kubectl wait cluster insights-timescale -n "$NS" --for=condition=Ready --timeout="$READY_TIMEOUT" &
            _wait_ts=$!
            _wait_rc=0
            wait $_wait_pg || { echo "Timed out or failed: insights-postgres not Ready"; describe_on_fail insights-postgres; _wait_rc=1; }
            wait $_wait_ts || { echo "Timed out or failed: insights-timescale not Ready"; describe_on_fail insights-timescale; _wait_rc=1; }
            if [ "$_wait_rc" -ne 0 ]; then
              echo "If a cluster was left over from a broken install, delete it and its PVCs, then retry: kubectl delete cluster insights-postgres insights-timescale -n $NS"
              exit 1
            fi
            {{- else if .Values.postgresql.ephemeral }}
            echo "Waiting for insights-postgres to be Ready (timeout=$READY_TIMEOUT)..."
            kubectl wait cluster insights-postgres -n "$NS" --for=condition=Ready --timeout="$READY_TIMEOUT" || { describe_on_fail insights-postgres; echo "Stuck cluster: delete Cluster + PVCs or fix secrets, then retry."; exit 1; }
            {{- else if .Values.timescale.ephemeral }}
            echo "Waiting for insights-timescale to be Ready (timeout=$READY_TIMEOUT)..."
            kubectl wait cluster insights-timescale -n "$NS" --for=condition=Ready --timeout="$READY_TIMEOUT" || { describe_on_fail insights-timescale; echo "Stuck cluster: delete Cluster + PVCs or fix secrets, then retry."; exit 1; }
            {{- end }}

            echo "=== CloudNativePG cluster job finished ==="

        securityContext:
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
{{- end }}
{{- if and .Values.postgresql.ephemeral (not .Values.postgresql.operator.install) }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: insights-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  instances: 1
  enableSuperuserAccess: true
  imageName: {{ .Values.postgresql.image.registry }}/{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
  postgresql:
    parameters:
{{- toYaml .Values.postgresql.parameters | nindent 6 }}
  bootstrap:
    initdb:
      database: {{ .Values.postgresql.auth.database }}
      owner: {{ .Values.postgresql.auth.username }}
      secret:
        name: {{ .Values.postgresql.auth.existingSecret }}
  superuserSecret:
    name: {{ .Values.postgresql.auth.existingSuperUserSecret }}
  storage:
    size: {{ .Values.postgresql.storage.size }}
    storageClass: {{ .Values.postgresql.storage.storageClass }}
  resources:
{{- toYaml .Values.postgresql.resources | nindent 4 }}
{{- end }}
{{- if and .Values.timescale.ephemeral (not .Values.postgresql.operator.install) }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ClusterImageCatalog
metadata:
  name: {{ include "fairwinds-insights.timescaleClusterImageCatalog" . }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  images:
    - major: {{ .Values.timescale.imageCatalog.major }}
      image: {{ include "fairwinds-insights.timescaleImage" . }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: insights-timescale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fairwinds-insights.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  instances: 1
  enableSuperuserAccess: true
  postgresUID: {{ .Values.timescale.postgresUID }}
  postgresGID: {{ .Values.timescale.postgresGID }}
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: {{ include "fairwinds-insights.timescaleClusterImageCatalog" . }}
    major: {{ .Values.timescale.imageCatalog.major }}
  postgresql:
{{- if .Values.timescale.sharedPreloadLibraries }}
    shared_preload_libraries:
{{- range .Values.timescale.sharedPreloadLibraries }}
      - {{ . }}
{{- end }}
{{- end }}
    parameters:
{{- toYaml .Values.timescale.parameters | nindent 6 }}
  bootstrap:
    initdb:
      database: {{ .Values.timescale.postgresqlDatabase }}
      owner: {{ .Values.timescale.postgresqlUsername }}
      secret:
        name: {{ .Values.timescale.auth.existingSecret }}
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS timescaledb;
  superuserSecret:
    name: {{ .Values.timescale.auth.existingSuperUserSecret }}
  storage:
    size: {{ .Values.timescale.storage.size }}
    {{- if .Values.timescale.storage.storageClass }}
    storageClass: {{ .Values.timescale.storage.storageClass }}
    {{- end }}
  resources:
{{- toYaml .Values.timescale.resources | nindent 4 }}
{{- end }}
