name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '32 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/stale@v4
        with:
          exempt-issue-labels: pinned
          stale-pr-label: stale
          stale-issue-label: stale
